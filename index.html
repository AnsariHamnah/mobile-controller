<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Game Controller</title>

<style>
/* ---------- GLOBAL ---------- */
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(1200px 800px at 50% 30%, #1a1a1a, #0b0b0b);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  touch-action: none;
  color: white;
}

/* ---------- CONTROLLER (DESKTOP) ---------- */
.controller {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  gap: 50px;
  padding: 40px;
}

/* ---------- JOYSTICKS ---------- */
.joystick-base {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #3a3a3a, #1f1f1f);
  box-shadow: inset 0 0 20px #000, 0 15px 40px rgba(0,0,0,.7);
  position: relative;
}

.joystick-knob {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #aaa, #666);
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 8px 20px rgba(0,0,0,.8);
}

/* ---------- ABXY BUTTONS ---------- */
.buttons {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  grid-template-rows: repeat(3, 70px);
  gap: 12px;
  justify-content: center;
  align-items: center;
}

.btn {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  font-size: 22px;
  font-weight: bold;
  border: none;
  box-shadow: 0 10px 24px rgba(0,0,0,.7);
}

.btn.a { background: #2ecc71; }
.btn.b { background: #e74c3c; }
.btn.x { background: #3498db; }
.btn.y { background: #f1c40f; }

.btn.active {
  transform: scale(0.95);
  box-shadow: inset 0 6px 14px rgba(0,0,0,.9);
  filter: brightness(1.2);
}

/* ---------- MOBILE (REALME NARZO 20 PRO OPTIMIZED) ---------- */
@media (max-width: 768px) {

  body {
    align-items: flex-end;
  }

  .controller {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    padding: 20px;
    width: 100%;
  }

  #leftBase {
    justify-self: start;
    transform: scale(1.15);
  }

  #rightBase {
    justify-self: end;
    transform: scale(1.15);
  }

  .buttons {
    grid-column: 1 / span 2;
    margin-top: 10px;
    transform: scale(1.1);
  }

  .joystick-base {
    width: 160px;
    height: 160px;
  }

  .joystick-knob {
    width: 65px;
    height: 65px;
  }

  .btn {
    width: 65px;
    height: 65px;
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="controller">

  <!-- LEFT JOYSTICK -->
  <div class="joystick-base" id="leftBase">
    <div class="joystick-knob" id="leftKnob"></div>
  </div>

  <!-- ABXY BUTTONS (XBOX LAYOUT) -->
  <div class="buttons">
    <div></div>
    <button class="btn y">Y</button>
    <div></div>

    <button class="btn x">X</button>
    <div></div>
    <button class="btn b">B</button>

    <div></div>
    <button class="btn a">A</button>
    <div></div>
  </div>

  <!-- RIGHT JOYSTICK -->
  <div class="joystick-base" id="rightBase">
    <div class="joystick-knob" id="rightKnob"></div>
  </div>

</div>

<script>
/* ===============================
   HAPTIC FEEDBACK (SAFE)
   =============================== */
function haptic(ms = 10) {
  if ("vibrate" in navigator) {
    navigator.vibrate(ms);
  }
}

/* ===============================
   MULTI-TOUCH JOYSTICKS
   =============================== */
function setupJoystick(base, knob) {
  const radius = 90;
  const knobRadius = 35;
  let pointerId = null;

  knob.addEventListener("pointerdown", e => {
  pointerId = e.pointerId;
  knob.setPointerCapture(pointerId);
  haptic(8); // light joystick feedback
});


  knob.addEventListener("pointermove", e => {
    if (e.pointerId !== pointerId) return;

    const rect = base.getBoundingClientRect();
    const x = e.clientX - rect.left - radius;
    const y = e.clientY - rect.top - radius;

    const dist = Math.min(Math.sqrt(x*x + y*y), radius - knobRadius);
    const angle = Math.atan2(y, x);

    knob.style.left = `${radius + dist * Math.cos(angle)}px`;
    knob.style.top  = `${radius + dist * Math.sin(angle)}px`;
  });

  knob.addEventListener("pointerup", reset);
  knob.addEventListener("pointercancel", reset);

  function reset() {
    pointerId = null;
    knob.style.left = "50%";
    knob.style.top = "50%";
  }
}

setupJoystick(leftBase, leftKnob);
setupJoystick(rightBase, rightKnob);

/* ===============================
   MULTI-TOUCH BUTTONS
   =============================== */
document.querySelectorAll(".btn").forEach(btn => {
  let pid = null;

  btn.addEventListener("pointerdown", e => {
  pid = e.pointerId;
  btn.setPointerCapture(pid);
  btn.classList.add("active");
  haptic(15); // button press feedback
});


  btn.addEventListener("pointerup", reset);
  btn.addEventListener("pointercancel", reset);

  function reset() {
    pid = null;
    btn.classList.remove("active");
  }
});
</script>

</body>
</html>
